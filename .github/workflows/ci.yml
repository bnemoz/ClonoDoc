name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast, OS-independent checks against the verification engine + CLI.
  core:
    name: core (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy (core + cli)
        run: cargo clippy -p abclone-core -p abclone-cli --all-targets -- -D warnings
      - name: test
        run: cargo test -p abclone-core -p abclone-cli

  # The GUI links against system graphics libs; build it per-OS.
  app:
    name: app build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - name: clippy (app, Linux only)
        if: runner.os == 'Linux'
        run: cargo clippy -p abclone-app --all-targets -- -D warnings
      - name: build release binary
        run: cargo build --release -p abclone-app
